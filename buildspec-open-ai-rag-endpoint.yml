version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-1
    AWS_REGION: us-west-1
    ARTIFACT_BUCKET: mlopswithsagemaker111
    STACK_NAME: open-ai-agentic-rag-endpoint
    PROJECT_NAME: open-ai-agentic-rag
    OPENAI_MODEL: gpt-5.2
    OPENAI_API_KEY_SECRET_ARN: arn:aws:secretsmanager:us-west-1:659613508664:secret:openai/api-key-6BGXhJ
    PINECONE_API_KEY_SECRET_ARN: arn:aws:secretsmanager:us-west-1:659613508664:secret:awspineconeapikey1-kiudra
    PINECONE_INDEX_NAME: news-demo
    PINECONE_INDEX_HOST: https://news-demo-4fe9eo0.svc.aped-4627-b74a.pinecone.io
    PINECONE_NAMESPACE: news
    PINECONE_MEMORY_NAMESPACE: agent-memory
    PINECONE_DUPLICATE_NAMESPACE: news
    PINECONE_CLASSIFICATION_NAMESPACE: news
    PINECONE_CLUSTERING_NAMESPACE: news
    PINECONE_MULTIMODAL_NAMESPACE: news
    DUPLICATE_SCORE_THRESHOLD: "0.98"
    SIMILARITY_SCORE_THRESHOLD: "0.85"

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install --upgrade pip
      - mkdir -p package
      - pip install -r rag_endpoint/requirements.txt -t package
  build:
    commands:
      - cp rag_endpoint/app.py package/app.py
      - mkdir -p package/knowledge
      - cp rag_endpoint/knowledge/open_ai_rag_knowledge.txt package/knowledge/open_ai_rag_knowledge.txt
      - cd package
      - zip -r ../open-ai-agentic-rag-endpoint.zip .
      - cd ..
      - aws s3 cp open-ai-agentic-rag-endpoint.zip "s3://${ARTIFACT_BUCKET}/open-ai-agentic-rag/open-ai-agentic-rag-endpoint.zip"
      - |
        aws cloudformation deploy \
          --region "$AWS_REGION" \
          --template-file infrastructure/open-ai-rag-endpoint.yaml \
          --stack-name "$STACK_NAME" \
          --capabilities CAPABILITY_NAMED_IAM \
          --parameter-overrides \
            ProjectName="$PROJECT_NAME" \
            ArtifactBucketName="$ARTIFACT_BUCKET" \
            LambdaZipKey=open-ai-agentic-rag/open-ai-agentic-rag-endpoint.zip \
            OpenAIApiKeySecretArn="$OPENAI_API_KEY_SECRET_ARN" \
            PineconeApiKeySecretArn="$PINECONE_API_KEY_SECRET_ARN" \
            PineconeIndexName="$PINECONE_INDEX_NAME" \
            PineconeIndexHost="$PINECONE_INDEX_HOST" \
            PineconeNamespace="$PINECONE_NAMESPACE" \
            PineconeMemoryNamespace="$PINECONE_MEMORY_NAMESPACE" \
            PineconeDuplicateNamespace="$PINECONE_DUPLICATE_NAMESPACE" \
            PineconeClassificationNamespace="$PINECONE_CLASSIFICATION_NAMESPACE" \
            PineconeClusteringNamespace="$PINECONE_CLUSTERING_NAMESPACE" \
            PineconeMultimodalNamespace="$PINECONE_MULTIMODAL_NAMESPACE" \
            DuplicateScoreThreshold="$DUPLICATE_SCORE_THRESHOLD" \
            SimilarityScoreThreshold="$SIMILARITY_SCORE_THRESHOLD" \
            OpenAIModel="$OPENAI_MODEL"
      - aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs" --output table
      - ENDPOINT_URL=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='EndpointUrl'].OutputValue | [0]" --output text)
      - 'curl -sS -f -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/pinecone_semantic_search_request.json -o pinecone-semantic-search-response.json'
      - python -c "import json; body=json.load(open('pinecone-semantic-search-response.json')); assert body.get('retrieval_source') == 'pinecone' and body.get('retrieved_context'), body; print('Pinecone semantic search task passed')"
      - 'curl -sS -f -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/pinecone_multimodal_retrieval_request.json -o pinecone-multimodal-retrieval-response.json'
      - python -c "import json; body=json.load(open('pinecone-multimodal-retrieval-response.json')); assert body.get('mode') == 'multimodal_retrieval' and body.get('retrieval_source') == 'pinecone' and body.get('retrieved_context'), body; print('Pinecone multimodal retrieval task passed')"
      - 'curl -sS -f -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/pinecone_chatbot_assistant_rag_request.json -o pinecone-chatbot-assistant-rag-response.json'
      - python -c "import json; body=json.load(open('pinecone-chatbot-assistant-rag-response.json')); assert body.get('mode') == 'chatbot_rag' and body.get('retrieval_source') == 'pinecone' and body.get('answer'), body; print('Pinecone RAG for chatbots and assistants task passed')"
      - 'curl -sS -f -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/pinecone_recommendations_request.json -o pinecone-recommendations-response.json'
      - python -c "import json; body=json.load(open('pinecone-recommendations-response.json')); assert body.get('retrieval_source') == 'pinecone' and body.get('recommendations'), body; print('Pinecone recommendation systems task passed')"
      - 'curl -sS -f -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/pinecone_agent_memory_request.json -o pinecone-agent-memory-response.json'
      - python -c "import json; body=json.load(open('pinecone-agent-memory-response.json')); assert body.get('namespace') == 'agent-memory' and body.get('stored_memory', {}).get('memory_id'), body; print('Pinecone memory for AI agents task passed')"
      - 'curl -sS -f -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/pinecone_duplicate_similarity_request.json -o pinecone-duplicate-similarity-response.json'
      - python -c "import json; body=json.load(open('pinecone-duplicate-similarity-response.json')); assert body.get('retrieval_source') == 'pinecone' and body.get('matches') is not None, body; print('Pinecone duplicate or similarity detection task passed')"
      - 'curl -sS -f -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/pinecone_classification_clustering_request.json -o pinecone-classification-clustering-response.json'
      - python -c "import json; body=json.load(open('pinecone-classification-clustering-response.json')); assert body.get('retrieval_source') == 'pinecone' and body.get('matches') is not None and body.get('clusters') is not None, body; print('Pinecone classification and clustering support task passed')"
      - 'curl -sS -f -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/open_ai_rag_endpoint_request.json -o open-ai-agentic-rag-endpoint-smoke-response.json'
      - python -c "import json; body=json.load(open('open-ai-agentic-rag-endpoint-smoke-response.json')); assert body.get('answer') and len(body.get('agents', [])) == 3, body; print('OpenAI multi-agent RAG endpoint smoke test passed')"

artifacts:
  files:
    - open-ai-agentic-rag-endpoint.zip
    - pinecone-semantic-search-response.json
    - pinecone-multimodal-retrieval-response.json
    - pinecone-chatbot-assistant-rag-response.json
    - pinecone-recommendations-response.json
    - pinecone-agent-memory-response.json
    - pinecone-duplicate-similarity-response.json
    - pinecone-classification-clustering-response.json
    - open-ai-agentic-rag-endpoint-smoke-response.json

